name: opendht
buildsystem: cmake-ninja
config-opts:
  - -DCMAKE_INSTALL_LIBDIR=/app/lib
  - -DBUILD_SHARED_LIBS=OFF
  - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
  - -DCMAKE_CXX_STANDARD=20
  - -DCMAKE_BUILD_TYPE=Release
  - -DBUILD_TESTING=Off
  - -DOPENDHT_DOCUMENTATION=Off 
  - -DOPENDHT_PROXY_CLIENT=On 
  - -DOPENDHT_PROXY_SERVER=On
  - -DOPENDHT_PUSH_NOTIFICATIONS=On
  - -DOPENDHT_IO_URING=Off 
  - -DOPENDHT_TOOLS=Off
sources:
  - type: archive
    url: https://github.com/savoirfairelinux/opendht/archive/4.1.1.tar.gz
    sha512: 5fc1fbfb7b766f66683d0e673dae848a37f37722770917292b4c703b6457a055f4a9736ffb21419634d9b58bbfbb49e9ffdd82fb5939e55b8845a49807fa1d4d
