name: opendht
buildsystem: cmake-ninja
config-opts:
  - -DCMAKE_INSTALL_LIBDIR=/app/lib
  - -DBUILD_SHARED_LIBS=OFF
  - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
  - -DCMAKE_CXX_STANDARD=20
  - -DCMAKE_BUILD_TYPE=Release
  - -DBUILD_TESTING=Off
  - -DOPENDHT_DOCUMENTATION=Off 
  - -DOPENDHT_PROXY_CLIENT=On 
  - -DOPENDHT_PROXY_SERVER=On
  - -DOPENDHT_PUSH_NOTIFICATIONS=On
  - -DOPENDHT_IO_URING=Off 
  - -DOPENDHT_TOOLS=Off
sources:
  - type: archive
    url: https://github.com/savoirfairelinux/opendht/archive/7cf3e8b73820a297ddb90b50065294fb11043c1d.tar.gz
    sha512: 9b8f55d3d779b463a7faec8c850b0bba6777a68bc3ab9562461bf61230eab2ce1c0cc1afe813e64e62e71f24f8e1f9a7164c6c5be56b69bf251c040a6b039719
