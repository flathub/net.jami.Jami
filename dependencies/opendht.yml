name: opendht
buildsystem: cmake-ninja
config-opts:
  - -DCMAKE_INSTALL_LIBDIR=/app/lib
  - -DBUILD_SHARED_LIBS=OFF
  - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
  - -DCMAKE_BUILD_TYPE=Release
  - -DBUILD_TESTING=Off
  - -DOPENDHT_DOCUMENTATION=Off 
  - -DOPENDHT_PROXY_CLIENT=On 
  - -DOPENDHT_PROXY_SERVER=Off
  - -DOPENDHT_PUSH_NOTIFICATIONS=On
  - -DOPENDHT_IO_URING=Off 
  - -DOPENDHT_TOOLS=Off
sources:
  - type: archive
    url: https://github.com/savoirfairelinux/opendht/archive/refs/tags/v3.7.3.tar.gz
    sha256: 58962692733a3cf236fa50d7d0f1613bcf4ee8acc487419725840667e75c3265
