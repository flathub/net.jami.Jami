name: opendht
buildsystem: cmake-ninja
config-opts:
  - -DCMAKE_INSTALL_LIBDIR=/app/lib
  - -DBUILD_SHARED_LIBS=OFF
  - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
  - -DCMAKE_CXX_STANDARD=20
  - -DCMAKE_BUILD_TYPE=Release
  - -DBUILD_TESTING=Off
  - -DOPENDHT_DOCUMENTATION=Off 
  - -DOPENDHT_PROXY_CLIENT=On 
  - -DOPENDHT_PROXY_SERVER=On
  - -DOPENDHT_PUSH_NOTIFICATIONS=On
  - -DOPENDHT_IO_URING=Off 
  - -DOPENDHT_TOOLS=Off
sources:
  - type: archive
    url: https://github.com/savoirfairelinux/opendht/archive/v4.2.0.tar.gz
    sha512: 926cf0b29e3a85f36627c6ffe5976c1c21e88622aa2f8fcba8b1405fd66822aec39912f6a17f9e0521fa7cefd7d736dc43c1d658e2f2237ec9938bf629c1f05b
