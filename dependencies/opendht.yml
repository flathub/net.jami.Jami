name: opendht
buildsystem: cmake-ninja
config-opts:
  - -DCMAKE_INSTALL_LIBDIR=/app/lib
  - -DBUILD_SHARED_LIBS=OFF
  - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
  - -DCMAKE_BUILD_TYPE=Release
  - -DBUILD_TESTING=Off
  - -DOPENDHT_DOCUMENTATION=Off 
  - -DOPENDHT_PROXY_CLIENT=On 
  - -DOPENDHT_PROXY_SERVER=Off
  - -DOPENDHT_PUSH_NOTIFICATIONS=On
  - -DOPENDHT_IO_URING=Off 
  - -DOPENDHT_TOOLS=Off
sources:
  - type: archive
    url: https://github.com/savoirfairelinux/opendht/archive/refs/tags/v3.7.7.tar.gz
    sha256: 7bd5a58e6f529c31bdd7472c3be249c6f2a9d33418986473202bbc76e40e552a
